[build]
  publish = "painel-atendimento"

[[redirects]]
  from = "/painel-atendimento"
  to = "/"
  status = 301

[[redirects]]
  from = "/painel-atendimento/*"
  to = "/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://chatbotautoatendimentomgf.onrender.com/api/:splat"
  status = 200
  force = true
