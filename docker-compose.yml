services:
  chatbot:
    build: .
    image: chatbot-autoatendimento
    container_name: chatbot-${MUNICIPIO:-municipio}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
